name: Lint

on:
  push:
    branches: [master]
    paths:
      - '**/*.js'
      - '**/*.css'
      - '**/*.json'
      - 'biome.json'
      - 'package.json'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.js'
      - '**/*.css'
      - '**/*.json'
      - 'biome.json'
      - 'package.json'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Biome (lint + format check)
        run: npx --yes @biomejs/biome@1.9.4 ci .
      - name: Line-count check (max 200, .js/.css)
        run: node scripts/check-line-count.js
