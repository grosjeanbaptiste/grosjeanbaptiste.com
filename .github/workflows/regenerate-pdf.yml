name: Regenerate CV PDFs from resume.json

on:
  push:
    branches: [master]
    paths:
      - 'assets/data/resume.json'
      - 'assets/data/i18n/**'
      - 'latex/altacv.cls'
      - 'scripts/generate-pdf.js'
      - '.github/workflows/regenerate-pdf.yml'
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache TeX Live
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: texlive-${{ runner.os }}-v1

      - name: Install TeX Live + CJK fonts (for the ZH variant via xelatex)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-xetex \
            texlive-lang-french \
            texlive-lang-european \
            texlive-lang-spanish \
            texlive-lang-german \
            texlive-lang-chinese \
            fonts-noto-cjk \
            lmodern

      - name: Generate PDFs
        run: node scripts/generate-pdf.js

      - name: Commit changes if any
        run: |
          if [[ -z "$(git status --porcelain assets/cv/)" ]]; then
            echo "No PDF changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/cv/
          git commit -m "chore: regenerate CV PDFs from resume.json"
          git push
