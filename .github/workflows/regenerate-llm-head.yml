name: Regenerate LLM head

on:
  push:
    branches: [master]
    paths:
      - 'assets/data/resume.json'
      - 'scripts/generate-llm-head.js'
      - '.github/workflows/regenerate-llm-head.yml'
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate
        run: node scripts/generate-llm-head.js

      - name: Commit changes if any
        run: |
          if [[ -z "$(git status --porcelain index.html)" ]]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: regenerate LLM head from resume.json"
          git push
